services:
  firestore:
    image: eclipse-temurin:21-jdk-alpine
    container_name: lumentix-internflow-firestore
    working_dir: /workspace
    command: sh -c "apk add --no-cache nodejs npm && npm install -g firebase-tools && firebase emulators:start --only firestore --project ltx-office-96354 --host 0.0.0.0"
    ports:
      - "8080:8080"
      - "4001:4001"
    volumes:
      - ./:/workspace
